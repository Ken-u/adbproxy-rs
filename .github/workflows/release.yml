name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_exists: ${{ steps.release.outputs.exists }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read Cargo version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '
            $0 == "[package]" { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          cargo_tag="v$version"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="$cargo_tag"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: cargo build --release --bins --target x86_64-unknown-linux-musl
            bin_dir: target/x86_64-unknown-linux-musl/release
            archive: adb-proxy-linux-x86_64-musl.tar.gz
            exe_suffix: ""
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            build: cargo build --release --bins --target aarch64-apple-darwin
            bin_dir: target/aarch64-apple-darwin/release
            archive: adb-proxy-macos-aarch64.tar.gz
            exe_suffix: ""
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            build: cargo build --release --bins --target x86_64-apple-darwin
            bin_dir: target/x86_64-apple-darwin/release
            archive: adb-proxy-macos-x86_64.tar.gz
            exe_suffix: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            build: cargo build --release --bins --target x86_64-pc-windows-msvc
            bin_dir: target/x86_64-pc-windows-msvc/release
            archive: adb-proxy-windows-x86_64.tar.gz
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: ${{ matrix.build }}

      - name: Verify Linux static binary
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail
          for bin in adb-proxy adb-hub; do
            file "${{ matrix.bin_dir }}/$bin"
            ldd "${{ matrix.bin_dir }}/$bin" 2>&1 | grep -E 'not a dynamic executable|statically linked'
          done

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/${{ matrix.name }}"
          mkdir -p "$staging"
          suffix="${{ matrix.exe_suffix }}"
          cp "${{ matrix.bin_dir }}/adb-proxy${suffix}" "$staging/adb-proxy${suffix}"
          cp "${{ matrix.bin_dir }}/adb-hub${suffix}" "$staging/adb-hub${suffix}"
          chmod +x "$staging/adb-proxy${suffix}" "$staging/adb-hub${suffix}"
          printf '%s\n' \
            'adb-proxy + adb-hub' \
            '' \
            'On the USB device host:' \
            '' \
            '    adb start-server' \
            '    ./adb-proxy --listen 0.0.0.0:5038 --target 127.0.0.1:5037' \
            '' \
            'On the client laptop:' \
            '' \
            '    adb kill-server' \
            '    ./adb-hub --backend office=<server_ip>:5038' \
            '    adb devices' \
            > "$staging/README.txt"
          tar -C "$staging" -czf "dist/${{ matrix.archive }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && needs.version.outputs.release_exists == 'false')
    needs:
      - version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag for Cargo version
        if: github.ref == 'refs/heads/main'
        env:
          TAG: ${{ needs.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: dist/*.tar.gz
          generate_release_notes: true
